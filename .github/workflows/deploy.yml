name: Build and Deploy PWA

on:
  push:
    branches:
      - main  # or 'master'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        # Replace 'lister' with your project name from angular.json
        # The --base-href MUST match your subfolder name
        run: npx ng build --configuration production --base-href /ng-lister-pwa/

      - name: Add .nojekyll
        # Prevents GitHub from ignoring files starting with underscores
        run: touch dist/lister/browser/.nojekyll

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/lister/browser # Path to your compiled files
          branch: gh-pages # The branch the action will deploy to
